{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 250px);">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="premium-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="h3 text-primary mb-3"><i class="bi bi-shield-lock-fill"></i></div>
                <h3 class="fw-bold">Welcome Back</h3>
                <p class="text-muted small">Enter your credentials to access the vault</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label small fw-medium">Username</label>
                    <input type="text" name="username" class="form-control px-3" placeholder="Enter username" required
                        autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-medium">Password</label>
                    <input type="password" name="password" class="form-control px-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm mb-4">
                    Sign In <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>

            <div class="text-center border-top pt-4">
                <p class="small text-muted mb-0">New to SecureShare? <a href="{{ url_for('register') }}"
                        class="text-primary text-decoration-none fw-bold">Create Account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
