{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 250px);">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="premium-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="h3 text-primary mb-3"><i class="bi bi-person-plus-fill"></i></div>
                <h3 class="fw-bold">Create Account</h3>
                <p class="text-muted small">Join our secure file sharing network</p>
            </div>

            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label small fw-medium">Username</label>
                    <input type="text" name="username" class="form-control px-3" placeholder="Choose a unique username"
                        required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-medium">Email Address</label>
                    <input type="email" name="email" class="form-control px-3" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-medium">Password</label>
                    <input type="password" name="password" class="form-control px-3"
                        placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm mb-4">
                    Join SecureShare <i class="bi bi-shield-check ms-2"></i>
                </button>
            </form>

            <div class="text-center border-top pt-4">
                <p class="small text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}"
                        class="text-primary text-decoration-none fw-bold">Sign In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
